appId: com.tonkic.chromiumprofilemanager
productName: Chromium Profile Manager
directories:
  output: release
artifactName: '${productName}-${version}-${os}-${arch}-lite.${ext}'
files:
  - dist/**
  - dist-electron/**
  - package.json
extraResources:
  - from: ../data
    to: data
    filter:
      - '**/*'
  - from: ../scripts
    to: scripts
    filter:
      - '**/*'
win:
  icon: build/icons/icon.ico
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
    - target: msi
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
