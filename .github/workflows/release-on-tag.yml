name: Build and release from main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare_release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create timestamp tag
        id: create_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="auto-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_tag.outputs.tag }}
          name: ${{ steps.create_tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build_windows_and_upload:
    name: Build Windows and upload assets
    runs-on: windows-latest
    needs: prepare_release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm --prefix app ci

      - name: Build Lite Electron Windows bundles
        run: npm --prefix app run build:electron:lite

      - name: Prepare runtime release asset
        shell: pwsh
        run: |
          if (Test-Path runtime/downloads/ungoogled-chromium_146.0.7680.177-1.1_windows_x64.zip) {
            Copy-Item runtime/downloads/ungoogled-chromium_146.0.7680.177-1.1_windows_x64.zip app/release/runtime-windows-x64-ungoogled-chromium-146.zip -Force
          } elseif (Test-Path runtime/ungoogled-chromium-146) {
            Compress-Archive -Path runtime/ungoogled-chromium-146 -DestinationPath app/release/runtime-windows-x64-ungoogled-chromium-146.zip -Force
          } else {
            Write-Host 'Runtime asset is not available in CI workspace; skipping runtime/full artifacts.'
          }

      - name: Build Full Electron Windows bundles
        shell: pwsh
        run: |
          if (Test-Path runtime/ungoogled-chromium-146) {
            npm --prefix app run build:electron:full
          } else {
            Write-Host 'Runtime directory is not available; skipping Full installer.'
          }

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: |
            app/release/*.exe
            app/release/*.msi
            app/release/runtime-windows-x64-*.zip
