name: Build and release from main

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  prepare_release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.create_tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create timestamp tag
        id: create_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="auto-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_tag.outputs.tag }}
          name: ${{ steps.create_tag.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build_windows_and_upload:
    name: Build Windows and upload assets
    runs-on: windows-latest
    needs: prepare_release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare_release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install app dependencies
        run: npm --prefix app ci

      - name: Build Lite Electron Windows bundles
        run: npm --prefix app run build:electron:lite

      - name: Download fingerprint Chromium runtime
        shell: pwsh
        env:
          RUNTIME_ZIP_URL: ${{ vars.RUNTIME_ZIP_URL || 'https://github.com/adryfish/fingerprint-chromium/releases/download/144.0.7559.132/ungoogled-chromium_144.0.7559.132-1.1_windows_x64.zip' }}
        run: |
          New-Item -ItemType Directory -Force runtime/downloads | Out-Null
          Invoke-WebRequest -Uri "$env:RUNTIME_ZIP_URL" -OutFile runtime/downloads/ungoogled-chromium_144.0.7559.132-1.1_windows_x64.zip
          New-Item -ItemType Directory -Force runtime/fingerprint-chromium-144 | Out-Null
          Expand-Archive -Path runtime/downloads/ungoogled-chromium_144.0.7559.132-1.1_windows_x64.zip -DestinationPath runtime/fingerprint-chromium-144 -Force

      - name: Prepare runtime release asset
        shell: pwsh
        run: |
          Copy-Item runtime/downloads/ungoogled-chromium_144.0.7559.132-1.1_windows_x64.zip app/release/runtime-windows-x64-fingerprint-chromium-144.zip -Force

      - name: Build Full Electron Windows bundles
        run: npm --prefix app run build:electron:full

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: |
            app/release/*.exe
            app/release/*.msi
            app/release/runtime-windows-x64-*.zip
